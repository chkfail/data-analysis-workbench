version: "2"

services:
  data-analysis-workbench:
    image: data-analysis-workbench:offline
    container_name: data-analysis-workbench
    restart: unless-stopped
    ports:
      - "${DATA_ANALYSIS_WORKBENCH_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
